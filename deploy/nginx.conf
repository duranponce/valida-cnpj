# Opcional: proxy para API Flask na mesma origem (ex.: atrás de um único host).
# Ajuste upstream se o serviço Compose se chamar diferente de "api".

upstream valida_api {
    server api:5000;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://valida_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://valida_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
